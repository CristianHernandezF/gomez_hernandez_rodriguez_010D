server:
  port: 8081

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # SERVICIO DE LOGIN (Público)
        - id: service-login
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/auth/**

        # SERVICIO DE DIRECCIONES (Protegido)
        - id: service-direccion
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/direcciones/**, /api/v1/comunas/**, /api/v1/regiones/**
          filters:
            - AuthenticationFilter

        # SERVICIO DE PACIENTES (Protegido)
        - id: service-pacientes
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/pacientes/**
          filters:
            - AuthenticationFilter

         # --- SEPARACIÓN DEL SERVICIO DE DOCTORES ---

        # 1. Registro y Gestión de Doctores (Público o sin filtro de RUN)
        # Esto permite crear doctores sin estar logueado previamente
        - id: service-doctores-gestion
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/doctores/**

        # 2. Gestión de Atenciones (Protegido)
        # Aquí sí se valida el Token y se extrae el RUN del Doctor
        - id: service-doctores-atenciones
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/atenciones/**
          filters:
            - AuthenticationFilter

        # ------------------------------------------

        # SERVICIO DE CALENDARIO (Protegido)
        - id: service-calendario
          uri: http://localhost:8086
          predicates:
            - Path=/api/v1/calendario/**
          filters:
            - AuthenticationFilter

        # SERVICIO DE ESTADO CITA (Protegido)
        - id: service-estadocita
          uri: http://localhost:8087
          predicates:
            - Path=/api/v1/estadocita/**
          filters:
            - AuthenticationFilter
        # SERVICIO DE FICHA MÉDICA (Protegido)
        - id: service-fichamedica
          uri: http://localhost:8088
          predicates:
            - Path=/api/v1/fichas/**
          filters:
            - AuthenticationFilter

        # SERVICIO DE REPORTES (Protegido - solo acceso interno desde fichamedica)
        - id: service-reportes
          uri: http://localhost:8089
          predicates:
            - Path=/api/v1/reportes/**
          filters:
            - AuthenticationFilter
            
jwt.secret: "39b45678a1b2c3d4e5f678901234567890abcdef1234567890abcdef12345678"